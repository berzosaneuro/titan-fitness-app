name: AĎS ROOM SPM

on:
  push:
    paths:
      - "AĎS ROOM/**"
      - ".github/workflows/AĎS ROOM-spm.yml"
  pull_request:
    paths:
      - "AĎS ROOM/**"
      - ".github/workflows/AĎS ROOM-spm.yml"

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift build
        run: cd AĎS ROOM && swift build -v
      - name: Swift test
        run: cd AĎS ROOM && swift test -v
