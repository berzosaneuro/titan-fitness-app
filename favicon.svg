<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#050505"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
  <text x="16" y="23" font-family="Arial Black, sans-serif" font-size="20" font-weight="900"
        text-anchor="middle" fill="#00F0FF"
        filter="url(#glow)">T</text>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
